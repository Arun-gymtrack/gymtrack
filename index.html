<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GymTrack">
<meta name="theme-color" content="#1A5C38">
<meta name="description" content="Couples gym tracker with exercise guides, weight tracking, and AI analysis">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<title>GymTrack — Couples Workout</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --h:#1A5C38;--h-mid:#2E8B57;--h-light:#DCF0E5;--h-pale:#F2FAF6;
  --w:#6B2480;--w-mid:#9B4DAB;--w-light:#EDD9F5;--w-pale:#FAF4FB;
  --amber:#B45309;--amber-bg:#FEF3C7;--amber-border:#F59E0B;
  --red:#991B1B;--red-bg:#FEE2E2;
  --ink:#0F172A;--ink-2:#334155;--ink-3:#64748B;--ink-4:#94A3B8;
  --surface:#FFFFFF;--s2:#F8FAFC;--s3:#F1F5F9;
  --border:#E2E8F0;--border-2:#CBD5E1;
  --r:10px;--r-lg:16px;--r-xl:22px;
  --profile:var(--h);--profile-light:var(--h-light);--profile-pale:var(--h-pale);--profile-mid:var(--h-mid);
}
.wife-mode{--profile:var(--w);--profile-light:var(--w-light);--profile-pale:var(--w-pale);--profile-mid:var(--w-mid);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:#E9EEF4;color:var(--ink);min-height:100vh;}
h1,h2,h3,h4{font-family:'Syne',sans-serif;}

.app{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;background:var(--surface);position:relative;overflow:hidden;}

/* ── Header ── */
.hdr{padding:14px 16px 0;background:var(--surface);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.5px;color:var(--ink);}
.logo span{color:var(--profile);}
.tog{display:flex;background:var(--s3);border-radius:100px;padding:3px;}
.tog-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:5px 14px;border-radius:100px;border:none;cursor:pointer;transition:all .18s;background:transparent;color:var(--ink-3);}
.tog-btn.ah{background:var(--h);color:#fff;}
.tog-btn.aw{background:var(--w);color:#fff;}
.tabs{display:flex;gap:0;padding:0 2px;}
.tab{font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;padding:9px 12px;border:none;background:transparent;cursor:pointer;color:var(--ink-3);border-bottom:2.5px solid transparent;transition:all .15s;}
.tab.active{color:var(--profile);border-bottom-color:var(--profile);}

/* ── Screens ── */
.scr{display:none;padding:14px;overflow-y:auto;flex:1;min-height:0;}
.scr.on{display:block;}

/* ── Day pills ── */
.day-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.dpill{padding:9px 4px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;transition:all .15s;}
.dpill.on{border-color:var(--profile);background:var(--profile-light);}
.dpill .dn{font-size:9px;font-weight:700;color:var(--ink-3);letter-spacing:.05em;text-transform:uppercase;}
.dpill .dt{font-size:13px;font-weight:700;color:var(--ink);font-family:'Syne',sans-serif;margin:1px 0;}
.dpill .ds{font-size:9px;color:var(--ink-4);}
.dpill.on .dt,.dpill.on .ds{color:var(--profile);}

/* ── Exercise card ── */
.ex-sec{margin-bottom:16px;}
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}
.exc{border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;overflow:hidden;transition:border-color .15s;}
.exc.pri{border-color:var(--profile);}
.exc-hd{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;}
.exc-dot{width:6px;height:6px;border-radius:50%;background:var(--border-2);flex-shrink:0;}
.exc.pri .exc-dot{background:var(--profile);}
.exc-info{flex:1;min-width:0;}
.exc-name{font-weight:600;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exc-sub{font-size:10.5px;color:var(--ink-3);margin-top:1px;}
.exc-btns{display:flex;gap:5px;align-items:center;flex-shrink:0;}
.how-btn{font-size:10.5px;font-weight:600;padding:4px 9px;border-radius:100px;border:1.5px solid var(--profile);background:transparent;color:var(--profile);cursor:pointer;transition:all .15s;white-space:nowrap;}
.how-btn:active{background:var(--profile);color:#fff;}
.chv{font-size:10px;color:var(--ink-4);transition:transform .18s;}
.exc.open .chv{transform:rotate(180deg);}
.exc-bd{display:none;padding:0 12px 12px;border-top:1px solid var(--border);}
.exc.open .exc-bd{display:block;}
.exc-note{font-size:11.5px;color:var(--profile);background:var(--profile-pale);padding:7px 10px;border-radius:8px;margin:9px 0 8px;border-left:3px solid var(--profile);line-height:1.5;}
.sets-hd{display:grid;grid-template-columns:26px 1fr 1fr 34px;gap:4px;margin-bottom:4px;}
.sets-lbl{font-size:9px;font-weight:700;letter-spacing:.04em;color:var(--ink-4);text-align:center;text-transform:uppercase;}
.set-row{display:grid;grid-template-columns:26px 1fr 1fr 34px;gap:4px;align-items:center;margin-bottom:4px;}
.sn{font-size:11px;font-weight:700;color:var(--ink-3);text-align:center;background:var(--s3);border-radius:6px;height:34px;display:flex;align-items:center;justify-content:center;}
.si{border:1.5px solid var(--border-2);border-radius:7px;padding:6px 4px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;text-align:center;width:100%;background:var(--surface);color:var(--ink);transition:border-color .12s;}
.si:focus{outline:none;border-color:var(--profile);}
.sd{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--border-2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s;}
.sd.ck{background:var(--profile);border-color:var(--profile);color:#fff;}
.pb-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);margin-left:5px;vertical-align:middle;}
.pb-prev{font-size:10.5px;color:var(--ink-3);padding:3px 0;display:flex;gap:8px;}

/* ── Buttons ── */
.btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;}
.btn-p{background:var(--profile);color:#fff;}
.btn-o{background:transparent;border:1.5px solid var(--border-2);color:var(--ink-2);}
.btn-sm{font-size:11.5px;padding:6px 12px;}
.btn-full{width:100%;margin-top:8px;}
.btn-ghost{background:transparent;border:none;color:var(--ink-3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:6px 10px;}

/* ── Weight tracker ── */
.wt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px;}
.wt-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px;}
.wt-entry{display:flex;gap:8px;align-items:flex-end;margin-bottom:12px;}
.wt-field{flex:1;}
.wt-field label{font-size:11px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:4px;}
.wt-input{width:100%;border:1.5px solid var(--border-2);border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:var(--ink);background:var(--surface);}
.wt-input:focus{outline:none;border-color:var(--profile);}
.wt-log{max-height:200px;overflow-y:auto;}
.wt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.wt-row:last-child{border-bottom:none;}
.wt-val{font-weight:700;font-size:15px;color:var(--profile);font-family:'Syne',sans-serif;}
.wt-del{background:transparent;border:none;color:var(--ink-4);cursor:pointer;font-size:14px;padding:2px 6px;}
.wt-trend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.trend-chip{background:var(--s3);border-radius:8px;padding:8px 12px;text-align:center;flex:1;min-width:80px;}
.trend-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--ink);}
.trend-lbl{font-size:10px;color:var(--ink-3);margin-top:2px;}

/* ── AI Analysis ── */
.ai-card{background:linear-gradient(135deg,var(--profile-pale) 0%,var(--surface) 100%);border:1.5px solid var(--profile-light);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ai-icon{width:36px;height:36px;border-radius:10px;background:var(--profile);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ai-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.ai-sub{font-size:11px;color:var(--ink-3);margin-top:1px;}
.ai-result{font-size:13px;color:var(--ink-2);line-height:1.7;white-space:pre-wrap;}
.ai-section{background:var(--surface);border-radius:8px;padding:10px 12px;margin-top:8px;border:1px solid var(--border);}
.ai-section-title{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--profile);margin-bottom:6px;}
.ai-loading{display:flex;align-items:center;gap:10px;padding:8px 0;}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--profile);margin:0 2px;animation:pulse 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,60%,100%{transform:scale(.8);opacity:.5}30%{transform:scale(1.2);opacity:1}}
.week-since{font-size:11px;color:var(--ink-3);margin-top:6px;}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;text-align:center;}
.stat-v{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--profile);}
.stat-l{font-size:10px;color:var(--ink-3);margin-top:1px;}

/* ── History ── */
.filter-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.fp{font-size:11px;font-weight:600;padding:5px 11px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;color:var(--ink-2);transition:all .15s;}
.fp.on{background:var(--profile);border-color:var(--profile);color:#fff;}
.hi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:6px;cursor:pointer;transition:all .15s;}
.hi:active{transform:scale(.98);}
.hi-date{font-size:10px;color:var(--ink-3);margin-bottom:2px;}
.hi-day{font-size:14px;font-weight:600;font-family:'Syne',sans-serif;color:var(--ink);margin-bottom:5px;}
.hi-stats{display:flex;gap:10px;}
.hi-stat{font-size:11px;color:var(--ink-3);}
.hi-stat strong{color:var(--ink-2);font-weight:600;}
.ex-hr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.ex-hr:last-child{border-bottom:none;}

/* ── Charts ── */
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px;}
.chart-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:10px;}
.cselect{font-family:'DM Sans',sans-serif;font-size:12px;border:1.5px solid var(--border-2);border-radius:7px;padding:6px 9px;background:var(--surface);color:var(--ink);margin-bottom:10px;width:100%;}
canvas{max-height:170px;}

/* ── PBs ── */
.pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.pb-c{background:var(--profile-pale);border:1px solid var(--profile-light);border-radius:var(--r);padding:11px;}
.pb-ex{font-size:9px;font-weight:700;color:var(--profile);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
.pb-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--ink);}
.pb-dt{font-size:10px;color:var(--ink-3);margin-top:1px;}

/* ── Guide modal ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
.guide-modal{background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding-bottom:20px;}
.gm-top{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.gm-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.gm-close{background:var(--s3);border:none;border-radius:100px;width:30px;height:30px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
.demo-wrap{padding:12px 16px;background:var(--s2);border-bottom:1px solid var(--border);}
.demo-phases{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.demo-phase{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 11px;}
.demo-phase-label{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;}
.demo-phase-label.start{color:var(--ink-3);}
.demo-phase-label.end{color:var(--profile);}
.demo-phase-desc{font-size:12px;color:var(--ink-2);line-height:1.55;}
.demo-key{background:var(--profile-pale);border:1px solid var(--profile-light);border-radius:var(--r);padding:8px 11px;}
.demo-key-label{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--profile);margin-bottom:5px;}
.demo-key-tip{font-size:12px;color:var(--ink-2);line-height:1.55;}
.gtabs{display:flex;border-bottom:1px solid var(--border);padding:0 14px;}
.gtab{font-size:12.5px;font-weight:600;padding:10px 12px;border:none;background:transparent;cursor:pointer;color:var(--ink-3);border-bottom:2.5px solid transparent;transition:all .15s;margin-bottom:-1px;}
.gtab.on{color:var(--profile);border-bottom-color:var(--profile);}
.gcon{padding:14px 16px;}
.gpanel{display:none;}
.gpanel.on{display:block;}
.cue-list{list-style:none;}
.cue{display:flex;gap:9px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5;}
.cue:last-child{border-bottom:none;}
.cue-n{width:20px;height:20px;border-radius:50%;background:var(--profile);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mis{display:flex;gap:8px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px;line-height:1.5;color:var(--ink-2);}
.mis:last-child{border-bottom:none;}
.mix{color:var(--red);font-size:12px;flex-shrink:0;}
.muscle-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.mt{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;background:var(--profile-light);color:var(--profile);border:1px solid var(--profile);}
.mts{background:var(--s3);color:var(--ink-3);border-color:var(--border);}
.glbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);margin:12px 0 6px;}

/* ── Hist modal ── */
.hist-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.hist-ov.on{display:flex;}
.hist-modal{background:var(--surface);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 16px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto;}

/* ── Toast ── */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 18px;border-radius:100px;font-size:12px;font-weight:500;z-index:500;opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;}

/* ── Empty ── */
.empty{text-align:center;padding:40px 20px;color:var(--ink-3);}
.empty-ico{font-size:30px;margin-bottom:8px;}
.empty h3{font-family:'Syne',sans-serif;font-size:16px;color:var(--ink-2);margin-bottom:4px;}
.empty p{font-size:12px;line-height:1.6;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px;}
</style>
</head>
<body>
<div class="app" id="app">

<div class="hdr">
  <div class="hdr-row">
    <div class="logo">Gym<span>Track</span></div>
    <div class="tog">
      <button class="tog-btn ah" id="btn-h" onclick="switchProfile('husband')">Husband</button>
      <button class="tog-btn" id="btn-w" onclick="switchProfile('wife')">Wife</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showScr('today')">Today</button>
    <button class="tab" onclick="showScr('weight')">Weight</button>
    <button class="tab" onclick="showScr('history')">History</button>
    <button class="tab" onclick="showScr('progress')">Progress</button>
    <button class="tab" onclick="showScr('bests')">Bests</button>
  </div>
</div>

<div class="scr on" id="scr-today">
  <div class="day-row" id="day-row"></div>
  <div id="session"></div>
</div>

<div class="scr" id="scr-weight">
  <div class="wt-card">
    <div class="wt-title">Log Weight</div>
    <div class="wt-entry">
      <div class="wt-field">
        <label>Date</label>
        <input type="date" class="wt-input" id="wt-date">
      </div>
      <div class="wt-field">
        <label>Weight (kg)</label>
        <input type="number" class="wt-input" id="wt-val" placeholder="e.g. 111.5" step="0.1" inputmode="decimal">
      </div>
      <div class="wt-field" style="max-width:80px">
        <label>Fat %</label>
        <input type="number" class="wt-input" id="wt-fat" placeholder="opt." step="0.1" inputmode="decimal">
      </div>
    </div>
    <button class="btn btn-p btn-full" onclick="logWeight()">Save Weight Entry</button>
  </div>
  <div class="wt-card">
    <div class="wt-title">7-Day Trend</div>
    <div class="wt-trend" id="wt-trend"></div>
  </div>
  <div class="chart-box">
    <div class="chart-title">Weight Over Time</div>
    <canvas id="wt-chart"></canvas>
  </div>
  <div class="wt-card" id="wt-log-card">
    <div class="wt-title">Weight Log</div>
    <div class="wt-log" id="wt-log"></div>
  </div>
  <div class="ai-card">
    <div class="ai-header">
      <div class="ai-icon">🤖</div>
      <div>
        <div class="ai-title">Weekly AI Analysis</div>
        <div class="ai-sub" id="ai-sub">Based on your last 7 weigh-ins + training data</div>
      </div>
    </div>
    <div id="ai-result"></div>
    <button class="btn btn-p btn-full" id="ai-btn" onclick="runAIAnalysis()" style="margin-top:10px">Analyse This Week</button>
    <div class="week-since" id="ai-last"></div>
  </div>
</div>

<div class="scr" id="scr-history">
  <div class="stats-row" id="stats-row"></div>
  <div class="filter-row" id="filter-row"></div>
  <div id="hist-list"></div>
</div>

<div class="scr" id="scr-progress">
  <div class="chart-box">
    <div class="chart-title">Lift Progression</div>
    <select class="cselect" id="prog-sel" onchange="renderProgChart()"></select>
    <canvas id="prog-chart"></canvas>
  </div>
  <div class="chart-box">
    <div class="chart-title">Weekly Volume</div>
    <canvas id="vol-chart"></canvas>
  </div>
</div>

<div class="scr" id="scr-bests">
  <div class="wt-card" style="margin-bottom:12px">
    <div class="wt-title">Personal Bests 🏆</div>

const saveWt=d=>localStorage.setItem(WK(),JSON.stringify(d));
const AIK=()=>`gt_ai_${profile}`;
const getAI=()=>{try{return JSON.parse(localStorage.getItem(AIK())||'{}')}catch(e){return{}}};
const saveAI=d=>localStorage.setItem(AIK(),JSON.stringify(d));

const todayKey=()=>new Date().toISOString().split('T')[0];
const fmtDate=iso=>{const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});};
const fmtShort=iso=>{const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});};

function switchProfile(p){
  profile=p;
  document.getElementById('app').classList.toggle('wife-mode',p==='wife');
  document.getElementById('btn-h').className='tog-btn'+(p==='husband'?' ah':'');
  document.getElementById('btn-w').className='tog-btn'+(p==='wife'?' aw':'');
  refresh();
}
function showScr(n){
  activeScr=n;
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById('scr-'+n).classList.add('on');
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['today','weight','history','progress','bests'][i]===n));
  refresh();
}
function refresh(){
  if(activeScr==='today')renderToday();
  else if(activeScr==='weight')renderWeight();
  else if(activeScr==='history')renderHistory();
  else if(activeScr==='progress')renderProgress();
  else if(activeScr==='bests')renderBests();
}

      const pb=getPB(ex.id);
      const sets=ex.sets===1?1:(profile==='wife'&&ex.pri==='H'&&ex.sets===4?3:ex.sets);
      const gKey=GUIDE_MAP[ex.id];
      const hasGuide=!!gKey&&!NO_GUIDE.has(ex.id);

      html+=`<div class="exc ${isPri?'pri':''}" id="exc-${ex.id}">
        <div class="exc-hd" onclick="togEx('${ex.id}')">
          <div class="exc-dot"></div>
          <div class="exc-info">
            <div class="exc-name">${ex.name}${isPri?`<span class="pb-tag">★ Priority</span>`:''}</div>
            <div class="exc-sub">${sets} sets × ${ex.reps}</div>
          </div>
          <div class="exc-btns">
            ${hasGuide?`<button class="how-btn" onclick="event.stopPropagation();openGuide('${gKey}')">How to</button>`:''}

          </div>
        </div>
        <div class="exc-bd">
          <div class="exc-note">${ex[nk]}</div>
          ${pb?`<div class="pb-prev"><span>🏆 Best: <strong>${pb.weight}kg × ${pb.reps} reps</strong></span><span style="color:var(--ink-4)">${fmtDate(pb.date)}</span></div>`:''}
          ${noTrack?`<div style="font-size:12px;color:var(--ink-3);padding:6px 0;">Complete for ${ex.reps} — no weight to log.</div>`:`
          <div class="sets-hd"><div class="sets-lbl">Set</div><div class="sets-lbl">kg</div><div class="sets-lbl">Reps</div><div class="sets-lbl">✓</div></div>
          ${Array.from({length:sets},(_,i)=>{
            const s=i+1,sd=exData[`s${s}`]||{};
            return `<div class="set-row">
              <div class="sn">${s}</div>
              <input class="si" type="number" placeholder="kg" min="0" step="0.5" value="${sd.w||''}" oninput="saveSet('${ex.id}',${s},'w',this.value)" inputmode="decimal">
              <input class="si" type="number" placeholder="reps" min="0" step="1" value="${sd.r||''}" oninput="saveSet('${ex.id}',${s},'r',this.value)" inputmode="numeric">

    html+=`</div>`;

  Object.keys(openMap).forEach(id=>{
    if(openMap[id]){const c=document.getElementById('exc-'+id);if(c)c.classList.add('open');}

function togEx(id){
  const c=document.getElementById('exc-'+id);
  if(!c)return;
  c.classList.toggle('open');
  openMap[id]=c.classList.contains('open');
}
function startSession(){
  toast('Session started — tap any exercise to log sets');
  const day=PLAN.days.find(d=>d.id===activeDay);
  const first=day.sections[1]?.exercises[0];
  if(first){const c=document.getElementById('exc-'+first.id);if(c){c.classList.add('open');openMap[first.id]=true;}}
}
function saveSet(exId,s,field,val){
  const data=getAll(),tk=todayKey();
  if(!data[tk])data[tk]={};
  if(!data[tk][activeDay])data[tk][activeDay]={};
  if(!data[tk][activeDay][exId])data[tk][activeDay][exId]={};
  if(!data[tk][activeDay][exId][`s${s}`])data[tk][activeDay][exId][`s${s}`]={};
  data[tk][activeDay][exId][`s${s}`][field]=val;
  saveAll(data);
  if(field==='w')checkPB(exId,s,data[tk][activeDay][exId]);
}
function togDone(exId,s,btn){
  const data=getAll(),tk=todayKey();
  if(!data[tk])data[tk]={};
  if(!data[tk][activeDay])data[tk][activeDay]={};
  if(!data[tk][activeDay][exId])data[tk][activeDay][exId]={};
  if(!data[tk][activeDay][exId][`s${s}`])data[tk][activeDay][exId][`s${s}`]={};
  const cur=data[tk][activeDay][exId][`s${s}`].d||false;
  data[tk][activeDay][exId][`s${s}`].d=!cur;
  btn.classList.toggle('ck',!cur);btn.textContent=!cur?'✓':'';
  saveAll(data);
}

function renderWeight(){
  document.getElementById('wt-date').value=todayKey();
  renderWtTrend();
  renderWtLog();
  renderWtChart();
  renderAIStatus();
}

function logWeight(){
  const date=document.getElementById('wt-date').value;
  const val=parseFloat(document.getElementById('wt-val').value);
  const fat=parseFloat(document.getElementById('wt-fat').value)||null;
  if(!date||isNaN(val)||val<30||val>300){toast('Please enter a valid weight');return;}
  const entries=getWt();
  const existing=entries.findIndex(e=>e.date===date);
  if(existing>=0)entries[existing]={date,weight:val,fat};
  else entries.push({date,weight:val,fat});
  entries.sort((a,b)=>a.date.localeCompare(b.date));
  saveWt(entries);
  document.getElementById('wt-val').value='';
  document.getElementById('wt-fat').value='';
  toast(`Weight saved: ${val}kg`);
  renderWtTrend();renderWtLog();renderWtChart();
}

function renderWtTrend(){
  const entries=getWt();
  if(!entries.length){document.getElementById('wt-trend').innerHTML='<div style="color:var(--ink-3);font-size:12px">Log your first weight to see trends</div>';return;}
  const last7=entries.slice(-7);
  const latest=last7[last7.length-1];
  const avg=(last7.reduce((s,e)=>s+e.weight,0)/last7.length).toFixed(1);
  const first=last7[0];
  const change=(latest.weight-first.weight).toFixed(1);
  const arrow=change<0?'↓':change>0?'↑':'→';
  const color=change<0?'var(--h-mid)':change>0?'var(--red)':'var(--ink-3)';

  // Target for this profile
  const target=profile==='husband'?108:75;
  const toTarget=(latest.weight-target).toFixed(1);

  document.getElementById('wt-trend').innerHTML=`
    <div class="trend-chip"><div class="trend-val">${latest.weight}</div><div class="trend-lbl">Latest (kg)</div></div>
    <div class="trend-chip"><div class="trend-val">${avg}</div><div class="trend-lbl">7-day avg</div></div>
    <div class="trend-chip"><div class="trend-val" style="color:${color}">${arrow}${Math.abs(change)}</div><div class="trend-lbl">7-day change</div></div>
    <div class="trend-chip"><div class="trend-val">${toTarget>0?'+'+toTarget:toTarget}</div><div class="trend-lbl">To target</div></div>
  `;
}

function renderWtLog(){
  const entries=getWt().slice().reverse();
  if(!entries.length){document.getElementById('wt-log').innerHTML='<div style="color:var(--ink-3);font-size:12px;padding:8px 0">No entries yet</div>';return;}
  document.getElementById('wt-log').innerHTML=entries.slice(0,20).map(e=>`
    <div class="wt-row">
      <div>
        <div style="font-size:12px;color:var(--ink-3)">${fmtDate(e.date)}</div>
        ${e.fat?`<div style="font-size:10px;color:var(--ink-4)">${e.fat}% body fat</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="wt-val">${e.weight} kg</div>
        <button class="wt-del" onclick="delWeight('${e.date}')">✕</button>
      </div>
    </div>`).join('');
}

function delWeight(date){
  const entries=getWt().filter(e=>e.date!==date);
  saveWt(entries);
  renderWtTrend();renderWtLog();renderWtChart();
}

function renderWtChart(){
  const entries=getWt();
  const ctx=document.getElementById('wt-chart').getContext('2d');
  if(wtChart)wtChart.destroy();
  if(!entries.length)return;
  const color=profile==='husband'?'#2E8B57':'#9B4DAB';
  const target=profile==='husband'?108:75;
  wtChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:entries.map(e=>fmtShort(e.date)),
      datasets:[
        {label:'Weight',data:entries.map(e=>e.weight),borderColor:color,backgroundColor:color+'18',borderWidth:2.5,pointBackgroundColor:color,pointRadius:3,tension:.3,fill:true},
        {label:'Target',data:entries.map(()=>target),borderColor:'#D4820A',borderWidth:1.5,borderDash:[5,5],pointRadius:0,fill:false}
      ]
    },
    options:{responsive:true,plugins:{legend:{display:true,labels:{font:{size:10},boxWidth:12}}},scales:{y:{beginAtZero:false,grid:{color:'#F1F5F9'}},x:{grid:{display:false},ticks:{maxRotation:30,font:{size:9}}}}}
  });
}

async function runAIAnalysis(){
  const entries=getWt();
  const gymData=getAll();
  if(entries.length<3){toast('Log at least 3 weight entries first');return;}

  const btn=document.getElementById('ai-btn');
  btn.disabled=true;
  btn.textContent='Analysing…';
  document.getElementById('ai-result').innerHTML=`<div class="ai-loading"><div class="dots"><span></span><span></span><span></span></div><div style="font-size:13px;color:var(--ink-3)">Claude is analysing your week…</div></div>`;

  // Prepare weight summary
  const last7=entries.slice(-7);
  const avgWeight=(last7.reduce((s,e)=>s+e.weight,0)/last7.length).toFixed(1);
  const weightChange=(last7[last7.length-1].weight-last7[0].weight).toFixed(1);
  const target=profile==='husband'?108:75;
  const startWeight=profile==='husband'?112:77;

  // Count sessions in last 7 days
  const sevenDaysAgo=new Date();sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
  let sessionCount=0,totalSets=0,totalVol=0;
  Object.entries(gymData).forEach(([date,sessions])=>{
    if(new Date(date)>=sevenDaysAgo){
      Object.values(sessions).forEach(session=>{sessionCount++;Object.values(session).forEach(ex=>Object.values(ex).forEach(set=>{if(set.d){totalSets++;if(set.w&&set.r)totalVol+=parseFloat(set.w)*parseInt(set.r);}}));});
    }
  });

  // Find any PBs this week
  const pbsThisWeek=[];
  Object.entries(gymData).forEach(([date,sessions])=>{
    if(new Date(date)>=sevenDaysAgo){
      PLAN.days.forEach(day=>day.sections.forEach(sec=>sec.exercises.forEach(ex=>{
        if(NO_TRACK.has(ex.id))return;
        const allTimeBest=getPB(ex.id);
        const thisWeekBest=getWeekPB(ex.id,sevenDaysAgo);
        if(thisWeekBest&&allTimeBest&&thisWeekBest.weight>=allTimeBest.weight){
          pbsThisWeek.push(`${ex.name}: ${thisWeekBest.weight}kg × ${thisWeekBest.reps} reps`);
        }
      })));
    }
  });

  const isHusband=profile==='husband';
  const profileContext=isHusband
    ? `Male, 45 years old, 112kg starting weight, current ~${last7[last7.length-1].weight}kg, target ~${target}kg. Fatty liver (NAFLD). Plays tennis 2x/week (Friday and Sunday). Weight training 4 days/week. Body fat focus: abdomen, hips, heavy thighs. Priority exercises: Hip Thrust, Romanian Deadlift, Wide-Stance Leg Press.`
    : `Female, 42 years old, 77kg starting weight, current ~${last7[last7.length-1].weight}kg, target ~${target}kg. Vegetarian (eggs ok). Weight training 4 days/week. Body fat focus: upper body, arms, back, shoulders. Priority exercises: Lat Pulldown, Shoulder Press, Lateral Raise, Tricep Pushdown.`;

  const prompt=`You are a sports nutritionist and personal trainer analysing weekly progress for a client.

PROFILE:
${profileContext}

WEIGHT DATA (last 7 entries):
${last7.map(e=>`${e.date}: ${e.weight}kg${e.fat?` (${e.fat}% body fat)`:''}`).join('\n')}
7-day average: ${avgWeight}kg
7-day change: ${weightChange}kg (negative = weight loss)
Target weight: ${target}kg
Remaining to target: ${(last7[last7.length-1].weight-target).toFixed(1)}kg

TRAINING DATA (last 7 days):
Sessions completed: ${sessionCount}
Total sets done: ${totalSets}
Total volume lifted: ${Math.round(totalVol)}kg
${pbsThisWeek.length>0?`Personal bests this week:\n${pbsThisWeek.join('\n')}`:'No new personal bests this week'}

CURRENT DIET PLAN SUMMARY:
- ${isHusband?'1,650–1,750 kcal/day, 140–155g protein, NAFLD protocol (no red meat, no alcohol, isabgol nightly)':'1,350–1,420 kcal/day, 90–100g protein, vegetarian with eggs'}
- Breakfast: overnight oats/chia/cottage cheese with whey
- Lunch: main carb meal (chicken${isHusband?'/dal':'/'} + veg + 1 roti or rice)
- Dinner: low carb, high protein

Please provide a concise weekly analysis in this EXACT format (keep each section to 2-3 sentences max):

PROGRESS SUMMARY
[Assess the weight trend honestly — is it on track, slow, or fast? Note if the 7-day average is moving in the right direction.]

TRAINING ASSESSMENT  
[Comment on session frequency, volume, and any PBs. Is training consistent?]

${weightChange>0.5?'ALERT: Weight is trending up — identify likely cause (water retention vs real gain vs dietary slip).\n\n':''}WHAT IS WORKING
[1-2 specific things going well based on the data]

ADJUSTMENTS THIS WEEK
[1-2 very specific, actionable changes. E.g. "Increase protein at dinner by adding 3 extra egg whites" or "Add 2.5kg to hip thrust — your last 2 sessions hit all reps". Be concrete, not generic.]

NEXT WEEK TARGET
[One specific weight target for the 7-day average next week]

Keep the entire response under 250 words. Be direct, evidence-based, and specific to this person's plan.`;

  try {
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await response.json();
    const result=data.content?.[0]?.text||'Analysis failed — please try again.';

    // Format result with section styling
    const formatted=result.replace(/^(PROGRESS SUMMARY|TRAINING ASSESSMENT|ALERT:.*|WHAT IS WORKING|ADJUSTMENTS THIS WEEK|NEXT WEEK TARGET)/gm,
      match=>`\n<strong style="color:var(--profile);font-size:11px;text-transform:uppercase;letter-spacing:.06em;">${match}</strong>`
    );

    document.getElementById('ai-result').innerHTML=`<div class="ai-section"><div class="ai-result">${formatted}</div></div>`;

    // Save result
    const aiData={result:formatted,lastRun:new Date().toISOString()};
    saveAI(aiData);
    document.getElementById('ai-last').textContent=`Last analysis: ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;

  } catch(e) {
    document.getElementById('ai-result').innerHTML=`<div class="ai-section"><div style="font-size:13px;color:var(--red)">Analysis failed. Check your internet connection and try again.</div></div>`;
  }

  btn.disabled=false;
  btn.textContent='Analyse This Week';
}

function getWeekPB(exId,since){
  const data=getAll();let best=null;
  Object.entries(data).forEach(([date,sessions])=>{
    if(new Date(date)<since)return;
    Object.values(sessions).forEach(session=>{
      if(session[exId])Object.values(session[exId]).forEach(set=>{
        if(set.w&&set.r){const w=parseFloat(set.w),r=parseInt(set.r);
          if(!best||w>best.weight||(w===best.weight&&r>best.reps))best={weight:w,reps:r,date};
        }
      });
    });
  });
  return best;
}

// ═══════════════════════════════════════════════
// PERSONAL BESTS
// ═══════════════════════════════════════════════
function getPB(exId){
  const data=getAll();let best=null;
  Object.entries(data).forEach(([date,sessions])=>{
    Object.values(sessions).forEach(session=>{
      if(session[exId])Object.values(session[exId]).forEach(set=>{
        if(set.w&&set.r){const w=parseFloat(set.w),r=parseInt(set.r);
          if(!best||w>best.weight||(w===best.weight&&r>best.reps))best={weight:w,reps:r,date};
        }
      });
    });
  });
  return best;
}
function checkPB(exId,s,exData){
  const sd=exData[`s${s}`]||{};if(!sd.w||!sd.r)return;
  const prev=getPB(exId);
  if(!prev||parseFloat(sd.w)>prev.weight)toast('🏆 New personal best!');
}
function renderBests(){
  const seen=new Set();const all=[];
  PLAN.days.forEach(d=>d.sections.forEach(s=>s.exercises.forEach(e=>{
    if(!NO_TRACK.has(e.id)&&!seen.has(e.id)){seen.add(e.id);all.push(e);}
  })));
  let html='';
  all.forEach(ex=>{
    const pb=getPB(ex.id);
    if(pb)html+=`<div class="pb-c"><div class="pb-ex">${ex.name.split('(')[0].trim().substring(0,22)}</div><div class="pb-val">${pb.weight}kg</div><div class="pb-dt">${pb.reps} reps · ${fmtDate(pb.date)}</div></div>`;
  });
  document.getElementById('pb-grid').innerHTML=html||`<div class="empty" style="grid-column:1/-1"><div class="empty-ico">🏆</div><h3>No bests yet</h3><p>Start logging sessions to see personal bests here.</p></div>`;
}

// ═══════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════
function renderHistory(){
  const data=getAll();const dates=Object.keys(data).sort().reverse();
  let ts=0,tsets=0,tvol=0;
  dates.forEach(date=>Object.values(data[date]).forEach(session=>{ts++;Object.values(session).forEach(ex=>Object.values(ex).forEach(set=>{if(set.d){tsets++;if(set.w&&set.r)tvol+=parseFloat(set.w||0)*parseInt(set.r||0);}}))}));
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-v">${ts}</div><div class="stat-l">Sessions</div></div>
    <div class="stat"><div class="stat-v">${tsets}</div><div class="stat-l">Sets Done</div></div>
    <div class="stat"><div class="stat-v">${(tvol/1000).toFixed(1)}t</div><div class="stat-l">Volume</div></div>`;
  const dnames=[{id:'all',label:'All'},...PLAN.days.map(d=>({id:d.id,label:d.name}))];
  document.getElementById('filter-row').innerHTML=dnames.map(d=>`<div class="fp ${histFilter===d.id?'on':''}" onclick="setFilt('${d.id}')">${d.label}</div>`).join('');
  if(!dates.length){document.getElementById('hist-list').innerHTML=`<div class="empty"><div class="empty-ico">📋</div><h3>No sessions yet</h3><p>Start logging workouts to see history here.</p></div>`;return;}
  let html='';
  dates.forEach(date=>{
    Object.entries(data[date]).forEach(([dayId,session])=>{
      if(histFilter!=='all'&&histFilter!==dayId)return;
      const day=PLAN.days.find(d=>d.id===dayId);if(!day)return;
      let sets=0,vol=0;
      Object.values(session).forEach(ex=>Object.values(ex).forEach(set=>{if(set.d){sets++;if(set.w&&set.r)vol+=parseFloat(set.w||0)*parseInt(set.r||0);}}));
      html+=`<div class="hi" onclick="showHistDetail('${date}','${dayId}')">
        <div class="hi-date">${fmtDate(date)}</div>
        <div class="hi-day">${day.name} — ${day.sub}</div>
        <div class="hi-stats"><div class="hi-stat"><strong>${sets}</strong> sets done</div><div class="hi-stat"><strong>${Math.round(vol)}kg</strong> volume</div></div>
      </div>`;
    });
  });
  document.getElementById('hist-list').innerHTML=html||`<div class="empty"><div class="empty-ico">🔍</div><h3>No sessions match</h3></div>`;
}
function setFilt(f){histFilter=f;renderHistory();}
function showHistDetail(date,dayId){
  const data=getAll();const session=data[date]?.[dayId]||{};const day=PLAN.days.find(d=>d.id===dayId);
  document.getElementById('hm-title').textContent=day.name;
  document.getElementById('hm-sub').textContent=fmtDate(date)+' · '+day.sub;
  let html='';
  day.sections.forEach(sec=>sec.exercises.forEach(ex=>{
    const exData=session[ex.id];if(!exData)return;
    const sets=Object.entries(exData).filter(([k])=>k.startsWith('s'));if(!sets.length)return;
    html+=`<div style="margin-bottom:11px"><div style="font-weight:600;font-size:13px;margin-bottom:5px;font-family:'Syne',sans-serif">${ex.name}</div>`;
    sets.forEach(([k,v])=>{if(v.w||v.r)html+=`<div class="ex-hr"><span>Set ${k.replace('s','')}</span><span>${v.w||'—'}kg × ${v.r||'—'} reps ${v.d?'✓':''}</span></div>`;});
    html+=`</div>`;
  }));
  document.getElementById('hm-body').innerHTML=html||'<p style="color:var(--ink-3);font-size:12px">No data logged for this session.</p>';
  document.getElementById('hist-ov').classList.add('on');
}
function closeHist(e){if(e.target===document.getElementById('hist-ov'))document.getElementById('hist-ov').classList.remove('on');}

// ═══════════════════════════════════════════════
// PROGRESS CHARTS
// ═══════════════════════════════════════════════
function renderProgress(){
  const seen=new Set();const all=[];
  PLAN.days.forEach(d=>d.sections.forEach(s=>s.exercises.forEach(e=>{if(!NO_TRACK.has(e.id)&&!seen.has(e.id)){seen.add(e.id);all.push(e);}})));
  const sel=document.getElementById('prog-sel');const cur=sel.value;
  sel.innerHTML=all.map(e=>`<option value="${e.id}">${e.name.split('(')[0].trim()}</option>`).join('');
  if(cur)sel.value=cur;
  renderProgChart();renderVolChart();
}
function renderProgChart(){
  const data=getAll();const exId=document.getElementById('prog-sel').value;const pts=[];
  Object.entries(data).sort().forEach(([date,sessions])=>{
    Object.values(sessions).forEach(session=>{
      if(session[exId]){let mx=0;Object.values(session[exId]).forEach(set=>{if(set.w)mx=Math.max(mx,parseFloat(set.w));});if(mx>0)pts.push({date:fmtShort(date),weight:mx});}
    });
  });
  const ctx=document.getElementById('prog-chart').getContext('2d');
  if(progChart)progChart.destroy();
  if(!pts.length)return;
  const color=profile==='husband'?'#2E8B57':'#9B4DAB';
  progChart=new Chart(ctx,{type:'line',data:{labels:pts.map(p=>p.date),datasets:[{label:'Max weight (kg)',data:pts.map(p=>p.weight),borderColor:color,backgroundColor:color+'18',borderWidth:2.5,pointBackgroundColor:color,pointRadius:4,tension:.3,fill:true}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,grid:{color:'#F1F5F9'}},x:{grid:{display:false},ticks:{maxRotation:30,font:{size:9}}}}}});
}
function renderVolChart(){
  const data=getAll();const vbd={};
  Object.entries(data).sort().forEach(([date,sessions])=>{
    let vol=0;Object.values(sessions).forEach(session=>Object.values(session).forEach(ex=>Object.values(ex).forEach(set=>{if(set.d&&set.w&&set.r)vol+=parseFloat(set.w)*parseInt(set.r);})));
    if(vol>0)vbd[fmtShort(date)]=Math.round(vol);
  });
  const ctx=document.getElementById('vol-chart').getContext('2d');
  if(volChart)volChart.destroy();
  if(!Object.keys(vbd).length)return;
  const color=profile==='husband'?'#2E8B57':'#9B4DAB';
  volChart=new Chart(ctx,{type:'bar',data:{labels:Object.keys(vbd),datasets:[{label:'Volume (kg)',data:Object.values(vbd),backgroundColor:color+'80',borderColor:color,borderWidth:1.5,borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#F1F5F9'}},x:{grid:{display:false},ticks:{maxRotation:30,font:{size:9}}}}}});
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2400);
}
